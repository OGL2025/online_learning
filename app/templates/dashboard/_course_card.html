<div class="card h-100 border-0 shadow-sm hover-lift">
    <div class="card-body">
        <div class="d-flex align-items-start mb-3">
            <div class="bg-light rounded-3 p-3 me-3 text-center">
                <i class="bi bi-journal-richtext fs-4 text-secondary"></i>
            </div>
            <div class="flex-grow-1">
                <span class="badge bg-light text-dark border mb-1">{{ course.code }}</span>
                <h6 class="card-title mb-0">{{ course.title }}</h6>
            </div>
        </div>
        
        <p class="card-text small text-muted text-truncate mb-3">
            {{ course.description or 'No description available.' }}
        </p>
        
        <div class="d-flex justify-content-between align-items-center border-top pt-3">
            <small class="text-muted">
                <i class="bi bi-people-fill"></i> Course
            </small>
            <a href="{{ url_for('main.view_course', course_id=course.id) }}" class="btn btn-sm btn-outline-primary">
                Enter <i class="bi bi-chevron-right"></i>
            </a>
        </div>
    </div>
</div>
